<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="contact.title">联系 · NAT 在线检测</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <header class="site-header">
    <div class="logo">NAT·Lab</div>
    <nav class="nav">
      <a href="index.html" data-i18n="nav.back">返回检测</a>
      <label class="lang-label" for="langSelect" data-i18n="nav.lang">语言</label>
      <select id="langSelect" class="lang-select" aria-label="Language">
        <option value="en">English</option>
        <option value="zh-CN">简体中文</option>
        <option value="zh-TW">繁體中文</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="pt-BR">Português (BR)</option>
        <option value="ru">Русский</option>
        <option value="ar">العربية</option>
        <option value="hi">हिन्दी</option>
        <option value="id">Bahasa Indonesia</option>
        <option value="th">ไทย</option>
        <option value="tr">Türkçe</option>
        <option value="vi">Tiếng Việt</option>
      </select>
    </nav>
  </header>

  <main class="legal">
    <h1 data-i18n="contact.title">联系</h1>
    <p data-i18n="contact.intro">如需反馈问题、商务合作或隐私相关咨询，请通过以下方式联系：</p>

    <ul class="legal-list">
      <li>
        <span data-i18n="contact.email_label">邮箱：</span>
        <span id="contactEmail">support@example.com</span>
      </li>
      <li data-i18n="contact.subject">反馈主题建议：NAT 检测反馈 / 广告合规 / 功能建议</li>
    </ul>

    <p class="legal-note" id="contactNote" data-i18n="contact.note">提示：请将邮箱替换为你的实际联系方式。</p>
  </main>

  <footer class="site-footer">
    <a href="index.html" data-i18n="nav.back">返回检测</a>
    <span>·</span>
    <a href="privacy.html" data-i18n="footer.privacy">隐私政策</a>
    <span>·</span>
    <a href="terms.html" data-i18n="footer.terms">服务条款</a>
  </footer>

  <script src="/i18n.js"></script>
  <script src="/config.js"></script>
  <script>
    const config = window.NATLAB_CONFIG || {};
    if (config.contactEmail) {
      document.getElementById("contactEmail").textContent = config.contactEmail;
    }
    if (config.contactNote) {
      document.getElementById("contactNote").textContent = config.contactNote;
    }
  </script>
</body>
</html>
