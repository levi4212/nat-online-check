<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact · NAT Online Check</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <header class="site-header">
    <div class="logo">NAT·Lab</div>
    <nav class="nav">
      <a href="index.html">Back to Test</a>
      <a href="/contact.html">中文</a>
    </nav>
  </header>

  <main class="legal">
    <h1>Contact</h1>
    <p>For feedback, partnerships, or privacy inquiries, reach us at:</p>

    <ul class="legal-list">
      <li>Email: <span id="contactEmail">support@example.com</span></li>
      <li>Suggested subject: NAT feedback / Ads compliance / Feature request</li>
    </ul>

    <p class="legal-note" id="contactNote">Please replace this with your actual contact info.</p>
  </main>

  <footer class="site-footer">
    <a href="index.html">Back to Test</a>
    <span>·</span>
    <a href="privacy.html">Privacy</a>
    <span>·</span>
    <a href="terms.html">Terms</a>
  </footer>

  <script src="/config.js"></script>
  <script>
    const config = window.NATLAB_CONFIG || {};
    if (config.contactEmail) {
      document.getElementById("contactEmail").textContent = config.contactEmail;
    }
    if (config.contactNote) {
      document.getElementById("contactNote").textContent = config.contactNote;
    }
  </script>
</body>
</html>
